  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .graph-grid {
      background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(20px);
    }

    .radar-grid {
      clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
    }

    .grid-cols-24 {
      grid-template-columns: repeat(24, minmax(0, 1fr));
    }

    .bg-micro-gradient {
      background: linear-gradient(15deg, #3525cd, #4f46e5);
    }

    .text-micro-gradient {
      background: linear-gradient(15deg, #3525cd, #4f46e5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .custom-range::-webkit-slider-runnable-track {
      background: #eceef0;
      height: 4px;
      border-radius: 2px;
    }

    .custom-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 16px;
      width: 16px;
      background: #3525cd;
      border-radius: 50%;
      margin-top: -6px;
      cursor: pointer;
    }

    /* Page transition */
    #content-area {
      animation-duration: 200ms;
      animation-fill-mode: both;
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .page-enter {
      animation-name: fadeSlideIn;
    }

    /* Pulse live dot */
    @keyframes livePulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    .live-dot {
      animation: livePulse 1.8s ease-in-out infinite;
    }

    /* Notification badge bounce */
    @keyframes micro-bounce {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.25)
      }
    }

    .badge-pulse {
      animation: micro-bounce 2s ease-in-out infinite;
    }

    /* Sidebar active indicator */
    .nav-active {
      color: #3525cd !important;
      font-weight: 700;
      background: rgba(99, 102, 241, 0.06);
      border-right: 2px solid #3525cd;
      border-radius: 0.5rem 0 0 0.5rem;
    }
  </style>

  <!-- ══════════════════════════════════════════════════════════ SCRIPTS ══ -->
  <script>
    // ── Router ──────────────────────────────────────────────────────────────
    const PAGES = ['overview', 'live', 'network', 'behavioral', 'cases', 'reports', 'settings'];
    let currentPage = 'overview';
    let liveInterval = null;

    function navigate(page) {
      if (!PAGES.includes(page)) page = 'overview';
      currentPage = page;

      // Clear live feed timer if leaving live page
      clearInterval(liveInterval);

      // Update active nav state
      document.querySelectorAll('.nav-link').forEach(el => {
        el.classList.remove('nav-active', 'text-indigo-700', 'font-bold');
        el.classList.add('text-slate-500');
      });
      const active = document.querySelector(`[data-page="${page}"]`);
      if (active) {
        active.classList.add('nav-active', 'text-indigo-700', 'font-bold');
        active.classList.remove('text-slate-500');
      }

      // Inject template content
      const tmpl = document.getElementById(`page-${page}`);
      const content = document.getElementById('content-area');
      if (tmpl) {
        content.innerHTML = '';
        const clone = tmpl.content.cloneNode(true);
        content.appendChild(clone);
        // Re-trigger animation
        content.classList.remove('page-enter');
        void content.offsetWidth;
        content.classList.add('page-enter');
      }

      // Push state
      history.pushState({ page }, '', `#${page}`);

      // Page-specific init
      if (page === 'live') initLiveFeed();
      if (page === 'overview') initTrendButtons();
      if (page === 'network') initNetworkMap();
    }

    // ── Network Globe ────────────────────────────────────────────────────────
    let myGlobe = null;
    function initNetworkMap() {
      const container = document.getElementById('globe-viz');
      if (!container) return;
      if (myGlobe) return; // already initialized?
      
      // Wait for parent div to have dimensions
      setTimeout(() => {
        const RISK_COUNTRIES = ['CYM', 'PAN', 'VGB', 'BHS', 'CHE', 'SGP'];
        const mockFlows = [
          { startLat: 40.7128, startLng: -74.006, endLat: 19.3133, endLng: -81.2546, color: '#ef4444' }, // US to Cayman
          { startLat: 51.5074, startLng: -0.1278, endLat: 47.3769, endLng: 8.5417, color: '#10b981' },  // UK to SWZ
          { startLat: 1.3521, startLng: 103.8198, endLat: 8.9824, endLng: -79.5199, color: '#ef4444' }, // SGP to PAN
          { startLat: 25.2048, startLng: 55.2708, endLat: 51.5074, endLng: -0.1278, color: '#10b981' }, // Dubai to UK
          { startLat: 22.3193, startLng: 114.1694, endLat: 40.7128, endLng: -74.006, color: '#10b981' } // HK to US
        ];

        myGlobe = Globe()
          (container)
          .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
          .backgroundColor('#020617')
          .arcsData(mockFlows)
          .arcColor('color')
          .arcDashLength(0.4)
          .arcDashGap(0.2)
          .arcDashAnimateTime(1500)
          .arcAltitude(0.3)
          .arcStroke(0.6)
          .width(container.offsetWidth)
          .height(container.offsetHeight);

        // Auto-rotate
        myGlobe.controls().autoRotate = true;
        myGlobe.controls().autoRotateSpeed = 0.5;
        myGlobe.pointOfView({ lat: 20, lng: 0, altitude: 2 });
        
        // Handle resize gracefully
        window.addEventListener('resize', () => {
          if(container.offsetWidth) {
            myGlobe.width(container.offsetWidth);
            myGlobe.height(container.offsetHeight);
          }
        });
      }, 100);
    }

    // ── Live Feed ────────────────────────────────────────────────────────────
    const TX_DATA = [
      { risk: 89, riskCls: 'bg-error-container text-on-error-container', entity: 'GlobalTrade Logistics Inc.', id: 'TX-9021-X992', amount: '$14,500.00', currency: 'USD', origin: 'Panama (KYC-B)', time: 'Just now', critical: false },
      { risk: 12, riskCls: 'bg-tertiary-fixed text-on-tertiary-fixed-variant', entity: 'Elena Rodriguez', id: 'TX-1182-A004', amount: '€842.10', currency: 'EUR', origin: 'Spain', time: '12s ago', critical: false },
      { risk: 96, riskCls: 'bg-error text-white', entity: 'CryptoPulse Exchange', id: 'TX-7712-C841', amount: '$52,000.00', currency: 'BTC Equiv.', origin: 'Unmapped Wallet', time: '45s ago', critical: true },
      { risk: 41, riskCls: 'bg-surface-container-highest text-on-surface-variant', entity: 'Markham & Sons', id: 'TX-8821-M110', amount: '$2,410.00', currency: 'USD', origin: 'United States', time: '1m ago', critical: false },
      { risk: 77, riskCls: 'bg-error-container text-on-error-container', entity: 'NexGen Holdings Ltd', id: 'TX-3312-N221', amount: '$31,000.00', currency: 'USD', origin: 'Cyprus (KYC-C)', time: '2m ago', critical: false },
      { risk: 22, riskCls: 'bg-tertiary-fixed text-on-tertiary-fixed-variant', entity: 'Petra Novak', id: 'TX-5501-P009', amount: '£1,200.00', currency: 'GBP', origin: 'Czech Republic', time: '3m ago', critical: false },
    ];

    function buildRow(tx, index) {
      const rowBg = tx.critical ? 'bg-error-container/10' : (index % 2 === 0 ? '' : 'bg-surface-container-low/10');
      return `<div class="grid grid-cols-12 px-6 py-5 border-b border-slate-50 items-center hover:bg-slate-50/50 transition-colors cursor-pointer group ${rowBg}">
    <div class="col-span-1"><div class="w-8 h-8 rounded-full ${tx.riskCls} flex items-center justify-center font-bold text-xs">${tx.risk}</div></div>
    <div class="col-span-4"><div class="text-sm font-semibold text-on-surface">${tx.entity}</div><div class="text-[11px] text-on-surface-variant font-mono">${tx.id}</div></div>
    <div class="col-span-2"><div class="text-sm font-bold tracking-tight text-on-surface">${tx.amount}</div><div class="text-[11px] text-tertiary font-medium">${tx.currency}</div></div>
    <div class="col-span-2"><div class="flex items-center gap-1 ${tx.critical ? 'text-error' : ''}"><span class="material-symbols-outlined text-xs ${tx.critical ? '' : 'text-on-surface-variant'}">public</span><span class="text-xs font-medium">${tx.origin}</span></div></div>
    <div class="col-span-3 text-right"><div class="text-xs ${tx.critical ? 'font-bold text-error' : 'text-on-surface-variant'}">${tx.critical ? 'CRITICAL • ' : ''}${tx.time}</div></div>
  </div>`;
    }

    function initLiveFeed() {
      const feed = document.getElementById('live-feed');
      if (!feed) return;
      let rows = [...TX_DATA];
      feed.innerHTML = rows.map((tx, i) => buildRow(tx, i)).join('');

      // Simulate new transactions
      const origins = ['Dubai (KYC-B)', 'Singapore', 'Germany', 'British Virgin Islands', 'Malta', 'Hong Kong'];
      const entities = ['Omega Capital Ltd', 'Sunrise Finance AG', 'BlueSky Networks', 'CoreTrade GmbH', 'Nexus Partners Co.'];
      let counter = 0;
      liveInterval = setInterval(() => {
        const feed2 = document.getElementById('live-feed');
        if (!feed2) { clearInterval(liveInterval); return; }
        counter++;
        const newTx = {
          risk: Math.floor(Math.random() * 50) + 40,
          riskCls: Math.random() > 0.5 ? 'bg-error-container text-on-error-container' : 'bg-surface-container-highest text-on-surface-variant',
          entity: entities[counter % entities.length],
          id: `TX-${Math.floor(Math.random() * 9000) + 1000}-NEW`,
          amount: `$${(Math.random() * 50000 + 1000).toFixed(2)}`,
          currency: ['USD', 'EUR', 'GBP'][counter % 3],
          origin: origins[counter % origins.length],
          time: 'Just now',
          critical: false
        };
        rows.unshift(newTx);
        if (rows.length > 8) rows.pop();
        feed2.innerHTML = rows.map((tx, i) => buildRow(tx, i)).join('');
        // Update throughput counter
        const el = document.getElementById('live-throughput');
        if (el) el.textContent = (4281 + Math.floor(Math.random() * 200 - 100)).toLocaleString();
      }, 3000);
    }

    // ── Trend tab toggle ─────────────────────────────────────────────────────
    function setTrendTab(btn) {
      btn.closest('div').querySelectorAll('button').forEach(b => {
        b.classList.remove('bg-surface-container-lowest', 'shadow-sm', 'text-primary');
        b.classList.add('text-on-surface-variant');
      });
      btn.classList.add('bg-surface-container-lowest', 'shadow-sm', 'text-primary');
      btn.classList.remove('text-on-surface-variant');
    }

    function initTrendButtons() {
      // already handled inline
    }

    // ── Hash-based routing ───────────────────────────────────────────────────
    window.addEventListener('popstate', e => {
      if (e.state && e.state.page) navigate(e.state.page);
    });

    // ── Live clock in top bar ────────────────────────────────────────────────
    function updateClock() {
      const btn = document.getElementById('btn-time');
      if (btn) {
        const now = new Date();
        btn.title = now.toLocaleTimeString('en-US', { hour12: false });
      }
      setTimeout(updateClock, 1000);
    }

    // ── Boot ─────────────────────────────────────────────────────────────────
    const hash = window.location.hash.replace('#', '');
    navigate(PAGES.includes(hash) ? hash : 'overview');
    updateClock();
  </script>
